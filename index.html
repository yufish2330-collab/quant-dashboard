function fmtVal(v) {
  // 13F value_millions 實際單位為千美元（命名有誤），需 ÷1000 得百萬
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'B';
  if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'M';
  if (v >= 1) return '$' + v.toFixed(0) + 'K';
  return '$' + (v*1000).toFixed(0);
}

// ════════════════════════════════════════════
//  TAB 3: 公司持倉（期貨 + 槓桿）
// ════════════════════════════════════════════
function renderPositions() {
  const el = document.getElementById('sec-positions');
  // 從 localStorage 讀取持倉設定
  let state;
  try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  const acct = state.acct || {tw: 100, us: 50, fut: 20};
  const futures = state.futures || [{name:'大台',lots:0,mult:200},{name:'小台',lots:0,mult:50},{name:'微台',lots:0,mult:5}];

  let h = '<h2>帳戶資產</h2><div class="card-grid">';
  h += `<div class="card"><h3>台股帳戶（萬）</h3>
    <input type="number" value="${acct.tw}" onchange="updatePositions('tw',this.value)" style="width:100%;padding:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#0f172a;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += `<div class="card"><h3>美股帳戶（萬）</h3>
    <input type="number" value="${acct.us}" onchange="updatePositions('us',this.value)" style="width:100%;padding:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#0f172a;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += `<div class="card"><h3>期貨保證金（萬）</h3>
    <input type="number" value="${acct.fut}" onchange="updatePositions('fut',this.value)" style="width:100%;padding:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#0f172a;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += '</div>';

  // 期貨配置
  h += '<h2>期貨配置</h2><div class="card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">';
  futures.forEach((f,i) => {
    h += `<div style="background:#ffffff;border-radius:8px;padding:14px">
      <div style="font-size:0.82rem;color:#94a3b8;margin-bottom:6px">${f.name}（${f.mult}點/口）</div>
      <input type="number" value="${f.lots}" min="0" onchange="updateFutures(${i},this.value)"
        style="width:80px;padding:6px;background:#f8fafc;border:1px solid #e2e8f0;color:#0f172a;border-radius:6px;font-size:1.3rem;font-weight:700;text-align:center">
      <div style="font-size:0.75rem;color:#94a3b8;margin-top:4px">口</div>
    </div>`;
  });
  h += '</div></div>';

  // 真實槓桿比（只有期貨產生槓桿，股票 1:1）
  const twiiPrice = 20000; // 預設台股加權指數
  const futExp = futures.reduce((s,f) => s + f.lots * f.mult * twiiPrice, 0);
  const totalEquity = (acct.tw + acct.us + acct.fut) * 10000; // 所有帳戶淨值（萬NTD→NTD）
  const stockExposure = (acct.tw + acct.us) * 10000; // 股票 1:1 無槓桿
  const totalExposure = stockExposure + futExp; // 股票曝險 + 期貨名目價值
  const lev = totalEquity > 0 ? totalExposure / totalEquity : 0;
  const levCol = lev < 1.5 ? '#0d9488' : lev < 2.5 ? '#d97706' : '#e11d48';

  h += '<h2>真實槓桿比</h2><div class="card">';
  h += '<div class="stat-row">';
  h += `<div class="stat-box"><div class="stat-value" style="color:#0369a1">NT$ ${totalEquity.toLocaleString()}</div><div class="stat-label">總淨值</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:#d97706">NT$ ${totalExposure.toLocaleString()}</div><div class="stat-label">總曝險</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:${levCol};font-size:2rem">${lev.toFixed(2)}x</div><div class="stat-label">真實槓桿</div></div>`;
  h += '</div>';
  // 槓桿條
  const levPct = Math.min(lev / 4 * 100, 100);
  h += `<div style="height:8px;border-radius:4px;background:#f1f5f9;margin-top:12px;overflow:hidden"><div style="height:100%;width:${levPct}%;background:${levCol};border-radius:4px"></div></div>`;
  h += '<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:#94a3b8;margin-top:4px"><span>0x</span><span style="color:#0d9488">1x 安全</span><span style="color:#d97706">2x 警戒</span><span style="color:#e11d48">3x+ 危險</span></div>';
  h += '</div>';

  // 曝險明細
  h += '<h2>曝險明細</h2><div class="card"><table><tr><th>項目</th><th style="text-align:right">金額 (NT$)</th><th style="text-align:right">佔總曝險</th><th>說明</th></tr>';
  const items = [
    {name:'台股現貨', val: acct.tw * 10000, note:'1:1 無槓桿'},
    {name:'美股現貨', val: acct.us * 10000, note:'1:1 無槓桿'},
  ];
  futures.forEach(f => {
    if (f.lots > 0) items.push({name: `${f.name}期（${f.lots}口×${f.mult}×${twiiPrice}）`, val: f.lots * f.mult * twiiPrice, note:'期貨槓桿'});
  });
  items.forEach(it => {
    const pct = totalExposure > 0 ? (it.val / totalExposure * 100).toFixed(1) : 0;
    h += `<tr><td>${it.name}</td><td style="text-align:right">${it.val.toLocaleString()}</td><td style="text-align:right">${pct}%</td><td style="color:#94a3b8;font-size:0.78rem">${it.note||''}</td></tr>`;
  });
  h += '</table></div>';

  el.innerHTML = h;
}

// 持倉更新 helpers
function updatePositions(key, val) {
  let state; try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  if (!state.acct) state.acct = {tw:100, us:50, fut:20};
  state.acct[key] = +val || 0;
  localStorage.setItem('yf-positions', JSON.stringify(state));
  renderPositions();
}
function updateFutures(idx, val) {
  let state; try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  if (!state.futures) state.futures = [{name:'大台',lots:0,mult:200},{name:'小台',lots:0,mult:50},{name:'微台',lots:0,mult:5}];
  state.futures[idx].lots = +val || 0;
  localStorage.setItem('yf-positions', JSON.stringify(state));
  renderPositions();
}

        <td>${e.us_equiv!=='N/A'?'<span class="tag tag-blue">'+e.us_equiv+'</span>':'-'}</td></tr>`;

  // 結論
  h += `<div class="card"><h3>關鍵發現</h3><ul style="padding-left:20px;line-height:2;font-size:0.88rem">
    <li><strong>A: 4檔動能</strong> Sharpe 1.06，年化 17.6%，對 VOO 年度勝率 70%</li>
    <li><strong>D: 40/30/30</strong> 防禦最強 — MDD 僅 14.7%，壓力週 -2.08% vs VOO -6.85%</li>
    <li><strong>E: 無GLD</strong> GLD 穩定度 1.00，不受 GLD 泡沫影響</li>
    <li>所有策略 WFA 效率 >1.0（樣本外表現比樣本內更好）</li>
    <li><strong style="color:#d97706">⚠ GLD 壓力測試</strong>：GLD 2024-26 累漲 +118%，若 GLD 持平 → 策略A Sharpe 從 1.06 降至 0.84（-21%）；若 GLD 跌 10% → 固定配置 Sharpe 降至 0.63</li>
    <li><strong>最安全選擇</strong>：策略E（無GLD）穩定度 1.00，或策略B（L2動態）會自動減少 GLD 配置</li>
    <li>台股研究已移至獨立「台股研究」tab — 19 種方法實測，最佳 Sharpe 1.24</li>
  </ul></div>`;

  // ── 超額報酬比較 ──
  if (D.alpha) {
    const a = D.alpha;
    const mom = a.momentum_strategy;
    h += `<h2>動能策略 vs 13F 超額報酬 (${esc(a.period)})</h2>`;
    h += '<div class="banner banner-warn">同期兩年比較 — 動能策略 vs 國會議員 / 機構投資人持股（用 Yahoo Finance 真實價格計算）</div>';

    // 核心績效對比表
    h += '<table><tr><th>投資組合</th><th>總報酬</th><th>年化</th><th>MDD</th><th>Sharpe</th><th>vs 動能</th></tr>';
    // 動能策略
    h += `<tr style="background:#f1f5f9"><td><strong>動能策略（基準）</strong></td><td class="positive"><strong>+${mom.total_return}%</strong></td>
      <td class="positive">${mom.ann_return}%</td><td class="negative">-${mom.mdd}%</td><td><strong>${mom.sharpe}</strong></td><td>—</td></tr>`;
    // VOO
    const voo = a.voo_benchmark;
    h += `<tr><td>VOO 大盤</td><td class="${retClass(voo.total_return)}">+${voo.total_return}%</td>
      <td>${voo.ann_return}%</td><td class="negative">-${voo.mdd}%</td><td>${voo.sharpe}</td>
      <td class="negative">${(voo.total_return-mom.total_return).toFixed(1)}%</td></tr>`;
    // 國會
    for (const [name, c] of Object.entries(a.congress||{})) {
      if (!c.metrics) continue;
      const m = c.metrics, diff = (m.total_return - mom.total_return).toFixed(1);
      h += `<tr><td>🏛 ${esc(name)} <span style="color:#94a3b8;font-size:0.75rem">${esc(c.desc)}</span></td>
        <td class="${retClass(m.total_return)}">+${m.total_return}%</td>
        <td>${m.ann_return}%</td><td class="negative">-${m.mdd}%</td><td>${m.sharpe}</td>
        <td class="${retClass(diff)}">${diff>0?'+':''}${diff}%</td></tr>`;
    }
    // 機構
    for (const [name, f] of Object.entries(a.institutional||{})) {
      if (!f.metrics) continue;
      const m = f.metrics, diff = (m.total_return - mom.total_return).toFixed(1);
      h += `<tr><td>🏦 ${esc(name)} <span style="color:#94a3b8;font-size:0.75rem">${esc(f.desc)}</span></td>

        <td>${m.ann_return}%</td><td class="negative">-${m.mdd}%</td><td>${m.sharpe}</td>
        <td class="${retClass(diff)}">${diff>0?'+':''}${diff}%</td></tr>`;
    }
    h += '</table>';

    // 統計摘要
    const congRets = Object.values(a.congress||{}).filter(c=>c.metrics).map(c=>c.metrics.total_return);
    const instRets = Object.values(a.institutional||{}).filter(c=>c.metrics).map(c=>c.metrics.total_return);
    const congAvg = congRets.length ? (congRets.reduce((a,b)=>a+b,0)/congRets.length) : 0;
    const instAvg = instRets.length ? (instRets.reduce((a,b)=>a+b,0)/instRets.length) : 0;
    const congMDD = Object.values(a.congress||{}).filter(c=>c.metrics).map(c=>c.metrics.mdd);
    const instMDD = Object.values(a.institutional||{}).filter(c=>c.metrics).map(c=>c.metrics.mdd);
    const congMDDAvg = congMDD.length ? (congMDD.reduce((a,b)=>a+b,0)/congMDD.length) : 0;
    const instMDDAvg = instMDD.length ? (instMDD.reduce((a,b)=>a+b,0)/instMDD.length) : 0;

    h += '<div class="card-grid">';
    h += `<div class="card"><h3>報酬比較</h3><div class="stat-row">
      <div class="stat-box"><div class="stat-value positive">+${mom.total_return}%</div><div class="stat-label">動能策略</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#0891b2">+${congAvg.toFixed(1)}%</div><div class="stat-label">國會平均</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#94a3b8">+${instAvg.toFixed(1)}%</div><div class="stat-label">機構平均</div></div>
    </div></div>`;
    h += `<div class="card"><h3>風險比較（MDD）</h3><div class="stat-row">

function drawChart(id, data, syms, weeks) {
  const c = document.getElementById(id); if (!c) return;
  const colors = ['#0369a1','#0d9488','#e11d48','#d97706','#94a3b8','#0891b2'];
  let commonDates = null;
  syms.forEach(s => { if (!data.data[s]) return; const d=Object.keys(data.data[s]).sort(); const r=weeks?d.slice(-weeks):d; if(!commonDates||r.length<commonDates.length) commonDates=r; });
  if (!commonDates||commonDates.length<2) return;
  const datasets = syms.map((s,i) => {
    if (!data.data[s]) return null;
    const bp = data.data[s][commonDates[0]]; if(!bp) return null;
    return { label:s, data:commonDates.map(d=>{const p=data.data[s][d];return p?((p/bp-1)*100):null;}), borderColor:colors[i%6], backgroundColor:'transparent', borderWidth:2, pointRadius:0, tension:0.1 };
  }).filter(Boolean);
  new Chart(c, { type:'line', data:{labels:commonDates,datasets}, options:{ responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#94a3b8'}}}, scales:{x:{ticks:{color:'#64748b',maxTicksLimit:12},grid:{color:'#e2e8f0'}},y:{ticks:{color:'#64748b',callback:v=>v+'%'},grid:{color:'#e2e8f0'}}} }});
}

function renderETF009() {
  const el = document.getElementById('sec-etf009');
  const d = D.etf009;
  let h = '';

  // 期間定義：今日 / 近5交易日（週）/ 近21交易日（月），滾動視窗
  const PERIODS = {
    today: {label: '今日',   chgKey: 'chg_pct', exKey: 'excess_vs_0050',    pChgKey: 'chg_pct'},
    week:  {label: '近一週', chgKey: 'chg_1w',  exKey: 'excess_1w_vs_0050', pChgKey: 'chg_1w'},
    month: {label: '近一月', chgKey: 'chg_1m',  exKey: 'excess_1m_vs_0050', pChgKey: 'chg_1m'},
  };
  const P = PERIODS[etfPeriod] || PERIODS.today;
  const fmtPct = v => (v === null || v === undefined) ? '-' : `${v>0?'+':''}${v}%`;
  const pctClass = v => (v === null || v === undefined) ? '' : retClass(v);

  // ── 區塊 1：ETF vs 0050 比較 ──
  if (d && d.prices) {
    h += `<div class="banner banner-ok">資料日期：${esc(d.date)} | 更新：${esc(d.updated)} | 持股資料：${esc(d.holdings_date||'-')}</div>`;

    // 期間切換按鈕
    h += '<div style="display:flex;gap:8px;margin:12px 0">';
    for (const [key, cfg] of Object.entries(PERIODS)) {
      const on = key === etfPeriod;
      h += `<button onclick="setEtfPeriod('${key}')" style="padding:7px 18px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;
        border:1px solid ${on?'#0369a1':'#e2e8f0'};background:${on?'#eff6ff':'#ffffff'};color:${on?'#0369a1':'#94a3b8'}">${cfg.label}</button>`;
    }
    h += '<span style="align-self:center;color:#94a3b8;font-size:0.75rem;margin-left:4px">週=近5交易日、月=近21交易日（滾動）</span></div>';

    const p0050 = d.prices['0050'], twii = d.prices['^TWII'];
    h += '<h2>基準</h2><div class="stat-row">';
    if (p0050) h += `<div class="stat-box"><div class="stat-value ${pctClass(p0050[P.pChgKey])}">${fmtPct(p0050[P.pChgKey])}</div><div class="stat-label">0050 元大台灣50（${P.label}）($${p0050.price})</div></div>`;
    if (twii) h += `<div class="stat-box"><div class="stat-value ${pctClass(twii[P.pChgKey])}">${fmtPct(twii[P.pChgKey])}</div><div class="stat-label">加權指數（${P.label}）</div></div>`;
    h += '</div>';

    const rankTable = (rows, title) => {
      if (!rows || !rows.length) return '';
      // 依選定期間重排：報酬高→低，無資料排最後
      const sorted = [...rows].sort((a, b) => {
        const av = a[P.chgKey], bv = b[P.chgKey];
        if (av === null || av === undefined) return 1;
        if (bv === null || bv === undefined) return -1;
        return bv - av;
      });
      let t = `<h2>${title}（${P.label}）</h2>`;
      t += `<table><tr><th>#</th><th>代號</th><th>名稱</th><th style="text-align:right">價格</th><th style="text-align:right">${P.label}報酬</th><th style="text-align:right">vs 0050 超額</th></tr>`;
      sorted.forEach((r, i) => {
        const chg = r[P.chgKey], ex = r[P.exKey];
        t += `<tr><td>${i+1}</td><td><strong>${esc(r.code)}</strong></td><td>${esc(r.name)}</td>
          <td style="text-align:right">$${r.price}</td>
          <td style="text-align:right" class="${pctClass(chg)}">${fmtPct(chg)}</td>
          <td style="text-align:right;font-weight:700" class="${pctClass(ex)}">${fmtPct(ex)}</td></tr>`;
      });
      return t + '</table>';
    };
    h += rankTable(d.rankings_active, '主動 ETF vs 0050');
    h += rankTable(d.rankings_passive, '被動/題材 ETF vs 0050');

    h += '<div class="banner banner-warn">無主動ETF數據（etf009_daily.json 缺失，請先執行 etf009_daily.py）</div>';

    // 持股異動
    const chg = d.changes || {};
    const moved = Object.entries(chg).filter(([,v]) => (v.added&&v.added.length) || (v.removed&&v.removed.length));
    if (moved.length) {
      h += '<h2>持股異動</h2><div class="card-grid">';
      moved.forEach(([etf, v]) => {
        h += `<div class="card"><h3>${esc(etf)} ${esc(v.name||'')}</h3>`;
        if (v.added && v.added.length) h += `<p style="font-size:0.82rem"><span style="color:#0d9488">新增：</span>${v.added.map(x=>esc(typeof x==='string'?x:(x.code||'')+' '+(x.name||''))).join('、')}</p>`;

        h += '</div>';

      h += '</div>';
    } else {
      h += '<p style="color:#94a3b8;font-size:0.82rem;margin:8px 0">本期無持股異動</p>';
    }
  }

  // ── 區塊 3：投顧推薦分析 ──
  const a = D.advisor;
  if (a && a.players && a.players.length) {
    h += `<h2>投顧推薦 PK（${esc(a.week_key||'')}）</h2>`;

  h += `<div class="stat-box"><div class="stat-value" style="color:#0d9488">${enabledCount}</div><div class="stat-label">已啟用</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:#d97706">${recentMentions.length}</div><div class="stat-label">近7日提及</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:#94a3b8">${recentEvents.length}</div><div class="stat-label">近7日事件</div></div>`;
  h += '</div>';

  // ── 熱門股票（多來源交叉）──
  const stockMentions = recentMentions.filter(m => m.code && m.source_id !== 'trump_truth' && m.source_id !== 'congress_house');
  const codeCount = {};
  stockMentions.forEach(m => {
    const k = m.code;
    if (!codeCount[k]) codeCount[k] = {code:k, name:m.name||'', count:0, sources:new Set()};
    codeCount[k].count++;
    codeCount[k].sources.add(m.source_id||'');
  });
  const hotStocks = Object.values(codeCount).filter(s => s.sources.size >= 2).sort((a,b) => b.count - a.count);

  h += '<h2>熱門股票提及（多來源交叉）</h2><div class="card">';
  if (hotStocks.length) {
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    hotStocks.slice(0,8).forEach(s => {
      const bg = s.count >= 3 ? '#fff1f2' : '#fffbeb';
      const co = s.count >= 3 ? '#e11d48' : '#d97706';
      h += `<span class="tag" style="background:${bg};color:${co}">${esc(s.code)} ${esc(s.name)} x${s.count}</span>`;
    });
    h += '</div>';
  } else {
    h += '<p style="color:#94a3b8;font-size:0.82rem;margin-bottom:10px">近7日無多來源交叉提及</p>';
  }

  // 提及表格
  if (stockMentions.length) {
    const srcNames = {};
    srcConfig.forEach(s => srcNames[s.id] = s.name);
    h += '<table><tr><th>來源</th><th>代碼</th><th>名稱</th><th style="text-align:right">時間</th></tr>';
    stockMentions.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,20).forEach(m => {
      const srcLabel = srcNames[m.source_id] || m.source_id || '';
      const ts = (m.timestamp||'').replace('T',' ').substring(5,16);
      h += `<tr><td><span class="tag tag-blue">${esc(srcLabel)}</span></td>
        <td><strong>${esc(m.code)}</strong></td><td>${esc(m.name)}</td>
        <td style="text-align:right;color:#94a3b8;font-size:0.8rem">${esc(ts)}</td></tr>`;
    });
    h += '</table>';
  } else {
    h += '<p style="color:#94a3b8;font-size:0.82rem">近7日無股票提及紀錄</p>';
  }
  h += '</div>';

  // ── 時事 Feed ──
  h += '<h2>時事 Feed（主題追蹤）</h2><div class="card">';
  if (recentEvents.length) {
    recentEvents.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,10).forEach(ev => {
      const dt = (ev.date || ev.timestamp || '').substring(0,10);
      h += `<div style="border-left:3px solid #e2e8f0;padding-left:14px;margin-bottom:14px">`;
      h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">`;
      h += `<strong style="font-size:0.88rem">${esc(ev.source_name||'')}</strong>`;
      h += `<span style="color:#94a3b8;font-size:0.78rem">${esc(dt)}</span></div>`;
      h += `<p style="font-size:0.85rem;margin:0 0 8px;line-height:1.5">${esc(ev.title||'')}</p>`;
      if (ev.topics && ev.topics.length) {
        h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">';
        ev.topics.forEach(t => h += `<span class="tag tag-purple">${esc(t)}</span>`);
        h += '</div>';
      }
      if (ev.news && ev.news.length) {
        ev.news.slice(0,2).forEach(n => {
          const arts = n.articles || [];
          arts.slice(0,1).forEach(a => {
            h += `<p style="font-size:0.8rem;color:#0891b2;margin:2px 0">📰 <a href="${esc(a.url||'')}" target="_blank" style="color:#0891b2">${esc(a.title||'')}</a></p>`;
          });
        });
      }
      h += '</div>';
    });
  } else {
    h += '<p style="color:#94a3b8;font-size:0.82rem">近7日無時事 Feed</p>';
  }
  h += '</div>';

  // ── 美股外部訊號 ──
  const trumpSignals = recentMentions.filter(m => m.source_id === 'trump_truth');
  const congressSignals = recentMentions.filter(m => m.source_id === 'congress_house');

  h += '<h2>美股外部訊號</h2><div class="card-grid">';

  // Trump
  h += '<div class="card"><h3>Trump Truth Social</h3>';
  if (trumpSignals.length) {
    trumpSignals.slice(0,5).forEach(s => {
      h += `<div style="border-left:3px solid #d97706;padding-left:12px;margin-bottom:12px">`;
      h += `<p style="font-size:0.82rem;margin:0 0 6px;color:#334155">"${esc((s.title||s.text||'').substring(0,150))}"</p>`;
      if (s.summary_zh) {
        h += `<p style="font-size:0.8rem;color:#94a3b8;margin:0 0 6px">🌐 ${esc(s.summary_zh)}</p>`;
      }
      if (s.keywords && s.keywords.length) {
        h += '<div style="display:flex;gap:4px;flex-wrap:wrap">';
        s.keywords.forEach(k => h += `<span class="tag tag-yellow">${esc(k)}</span>`);
        h += '</div>';
      }
      const ts = (s.timestamp||'').replace('T',' ').substring(5,16);
      h += `<p style="font-size:0.72rem;color:#94a3b8;margin-top:4px">${esc(ts)}</p>`;
      h += '</div>';
    });
  } else {
    h += '<p style="color:#94a3b8;font-size:0.82rem">近7日無市場相關發言</p>';
  }
  h += '</div>';

  // 國會
  h += '<div class="card"><h3>美國眾院議員交易</h3>';
  if (congressSignals.length) {
    h += '<table><tr><th>議員</th><th>申報日</th><th style="text-align:right">連結</th></tr>';
    congressSignals.slice(0,8).forEach(s => {
      const fd = (s.filing_date||'').substring(0,10);
      h += `<tr><td><strong>${esc(s.member||s.full_name||'')}</strong></td>
        <td>${esc(fd)}</td>
        <td style="text-align:right">${s.pdf_url ? `<a href="${esc(s.pdf_url)}" target="_blank" style="color:#0891b2">PDF</a>` : '-'}</td></tr>`;
    });
    h += '</table>';
  } else {
    h += '<p style="color:#94a3b8;font-size:0.82rem">近期無知名議員申報</p>';
  }
  h += '</div></div>';

  // ── 來源狀態 ──
  h += '<h2>來源狀態</h2><div class="card">';
  h += '<table><tr><th>來源名稱</th><th>類型</th><th style="text-align:center">狀態</th><th>頻率</th></tr>';
  srcConfig.forEach(s => {
    const st = s.enabled
      ? '<span class="tag tag-green">啟用</span>'
      : '<span class="tag tag-red">停用</span>';
    h += `<tr><td>${esc(s.name)}</td><td style="color:#94a3b8">${esc(s.type)}</td>
      <td style="text-align:center">${st}</td><td style="color:#94a3b8">${esc(s.freq)}</td></tr>`;
  });
  h += '</table></div>';

  el.innerHTML = h;
}

loadAll();
</script>
</body>
</html>
