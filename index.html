function fmtVal(v) {
  // 13F value_millions 實際單位為千美元（命名有誤），需 ÷1000 得百萬
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'B';
  if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'M';
  if (v >= 1) return '$' + v.toFixed(0) + 'K';
  return '$' + (v*1000).toFixed(0);
}

function renderPositions() {
  const el = document.getElementById('sec-positions');
  // 從 localStorage 讀取持倉設定
  let state;
  try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  const acct = state.acct || {tw: 100, us: 50, fut: 20};
  const futures = state.futures || [{name:'大台',lots:0,mult:200},{name:'小台',lots:0,mult:50},{name:'微台',lots:0,mult:5}];

  let h = '<h2>帳戶資產</h2><div class="card-grid">';
  h += `<div class="card"><h3>台股帳戶（萬）</h3>
    <input type="number" value="${acct.tw}" onchange="updatePositions('tw',this.value)" style="width:100%;padding:8px;background:#1a1a28;border:1px solid #333;color:#fff;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += `<div class="card"><h3>美股帳戶（萬）</h3>
    <input type="number" value="${acct.us}" onchange="updatePositions('us',this.value)" style="width:100%;padding:8px;background:#1a1a28;border:1px solid #333;color:#fff;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += `<div class="card"><h3>期貨保證金（萬）</h3>
    <input type="number" value="${acct.fut}" onchange="updatePositions('fut',this.value)" style="width:100%;padding:8px;background:#1a1a28;border:1px solid #333;color:#fff;border-radius:6px;font-size:1.2rem;font-weight:700;text-align:center">
  </div>`;
  h += '</div>';

  // 期貨配置
  h += '<h2>期貨配置</h2><div class="card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">';
  futures.forEach((f,i) => {
    h += `<div style="background:#111118;border-radius:8px;padding:14px">
      <div style="font-size:0.82rem;color:#888;margin-bottom:6px">${f.name}（${f.mult}點/口）</div>
      <input type="number" value="${f.lots}" min="0" onchange="updateFutures(${i},this.value)"
        style="width:80px;padding:6px;background:#0a0a0f;border:1px solid #333;color:#fff;border-radius:6px;font-size:1.3rem;font-weight:700;text-align:center">
      <div style="font-size:0.75rem;color:#666;margin-top:4px">口</div>
    </div>`;
  });
  h += '</div></div>';

  // 真實槓桿比（只有期貨產生槓桿，股票 1:1）
  const twiiPrice = 20000; // 預設台股加權指數
  const futExp = futures.reduce((s,f) => s + f.lots * f.mult * twiiPrice, 0);
  const totalEquity = (acct.tw + acct.us + acct.fut) * 10000; // 所有帳戶淨值（萬NTD→NTD）
  const stockExposure = (acct.tw + acct.us) * 10000; // 股票 1:1 無槓桿
  const totalExposure = stockExposure + futExp; // 股票曝險 + 期貨名目價值
  const lev = totalEquity > 0 ? totalExposure / totalEquity : 0;
  const levCol = lev < 1.5 ? '#2ecc71' : lev < 2.5 ? '#f39c12' : '#e74c3c';

  h += '<h2>真實槓桿比</h2><div class="card">';
  h += '<div class="stat-row">';
  h += `<div class="stat-box"><div class="stat-value" style="color:#7c85ff">NT$ ${totalEquity.toLocaleString()}</div><div class="stat-label">總淨值</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:#f39c12">NT$ ${totalExposure.toLocaleString()}</div><div class="stat-label">總曝險</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:${levCol};font-size:2rem">${lev.toFixed(2)}x</div><div class="stat-label">真實槓桿</div></div>`;
  h += '</div>';
  // 槓桿條
  const levPct = Math.min(lev / 4 * 100, 100);
  h += `<div style="height:8px;border-radius:4px;background:#1a1a28;margin-top:12px;overflow:hidden"><div style="height:100%;width:${levPct}%;background:${levCol};border-radius:4px"></div></div>`;
  h += '<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:#666;margin-top:4px"><span>0x</span><span style="color:#2ecc71">1x 安全</span><span style="color:#f39c12">2x 警戒</span><span style="color:#e74c3c">3x+ 危險</span></div>';
  h += '</div>';

  // 曝險明細
  h += '<h2>曝險明細</h2><div class="card"><table><tr><th>項目</th><th style="text-align:right">金額 (NT$)</th><th style="text-align:right">佔總曝險</th><th>說明</th></tr>';
  const items = [
    {name:'台股現貨', val: acct.tw * 10000, note:'1:1 無槓桿'},
    {name:'美股現貨', val: acct.us * 10000, note:'1:1 無槓桿'},
  ];
  futures.forEach(f => {
    if (f.lots > 0) items.push({name: `${f.name}期（${f.lots}口×${f.mult}×${twiiPrice}）`, val: f.lots * f.mult * twiiPrice, note:'期貨槓桿'});
  });
  items.forEach(it => {
    const pct = totalExposure > 0 ? (it.val / totalExposure * 100).toFixed(1) : 0;
    h += `<tr><td>${it.name}</td><td style="text-align:right">${it.val.toLocaleString()}</td><td style="text-align:right">${pct}%</td><td style="color:#888;font-size:0.78rem">${it.note||''}</td></tr>`;
  });
  h += '</table></div>';

  el.innerHTML = h;
}

// 持倉更新 helpers
function updatePositions(key, val) {
  let state; try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  if (!state.acct) state.acct = {tw:100, us:50, fut:20};
  state.acct[key] = +val || 0;
  localStorage.setItem('yf-positions', JSON.stringify(state));
  renderPositions();
}
function updateFutures(idx, val) {
  let state; try { state = JSON.parse(localStorage.getItem('yf-positions') || '{}'); } catch(e) { state = {}; }
  if (!state.futures) state.futures = [{name:'大台',lots:0,mult:200},{name:'小台',lots:0,mult:50},{name:'微台',lots:0,mult:5}];
  state.futures[idx].lots = +val || 0;
  localStorage.setItem('yf-positions', JSON.stringify(state));
  renderPositions();
}

        <td>${e.us_equiv!=='N/A'?'<span class="tag tag-blue">'+e.us_equiv+'</span>':'-'}</td></tr>`;
    });
    h += '</table>';
  }

  // 美股走勢
  h += '<h2>美股 ETF 近 3 年標準化走勢</h2><div class="chart-container"><canvas id="chartUS"></canvas></div>';

  // 結論
  h += `<div class="card"><h3>關鍵發現</h3><ul style="padding-left:20px;line-height:2;font-size:0.88rem">
    <li><strong>A: 4檔動能</strong> Sharpe 1.06，年化 17.6%，對 VOO 年度勝率 70%</li>
    <li><strong>D: 40/30/30</strong> 防禦最強 — MDD 僅 14.7%，壓力週 -2.08% vs VOO -6.85%</li>
    <li><strong>E: 無GLD</strong> GLD 穩定度 1.00，不受 GLD 泡沫影響</li>
    <li>所有策略 WFA 效率 >1.0（樣本外表現比樣本內更好）</li>
    <li><strong style="color:#f39c12">⚠ GLD 壓力測試</strong>：GLD 2024-26 累漲 +118%，若 GLD 持平 → 策略A Sharpe 從 1.06 降至 0.84（-21%）；若 GLD 跌 10% → 固定配置 Sharpe 降至 0.63</li>
    <li><strong>最安全選擇</strong>：策略E（無GLD）穩定度 1.00，或策略B（L2動態）會自動減少 GLD 配置</li>
    <li>台股研究已移至獨立「台股研究」tab — 19 種方法實測，最佳 Sharpe 1.24</li>
  </ul></div>`;

  // ── 超額報酬比較 ──
  if (D.alpha) {
    const a = D.alpha;
    const mom = a.momentum_strategy;
    h += `<h2>動能策略 vs 13F 超額報酬 (${esc(a.period)})</h2>`;
    h += '<div class="banner banner-warn">同期兩年比較 — 動能策略 vs 國會議員 / 機構投資人持股（用 Yahoo Finance 真實價格計算）</div>';

    // 核心績效對比表
    h += '<table><tr><th>投資組合</th><th>總報酬</th><th>年化</th><th>MDD</th><th>Sharpe</th><th>vs 動能</th></tr>';
    // 動能策略
    h += `<tr style="background:#1a1a2e"><td><strong>動能策略（基準）</strong></td><td class="positive"><strong>+${mom.total_return}%</strong></td>
      <td class="positive">${mom.ann_return}%</td><td class="negative">-${mom.mdd}%</td><td><strong>${mom.sharpe}</strong></td><td>—</td></tr>`;
    // VOO
    const voo = a.voo_benchmark;
    h += `<tr><td>VOO 大盤</td><td class="${retClass(voo.total_return)}">+${voo.total_return}%</td>
      <td>${voo.ann_return}%</td><td class="negative">-${voo.mdd}%</td><td>${voo.sharpe}</td>
      <td class="negative">${(voo.total_return-mom.total_return).toFixed(1)}%</td></tr>`;
    // 國會
    for (const [name, c] of Object.entries(a.congress||{})) {
      if (!c.metrics) continue;
      const m = c.metrics, diff = (m.total_return - mom.total_return).toFixed(1);
      h += `<tr><td>🏛 ${esc(name)} <span style="color:#666;font-size:0.75rem">${esc(c.desc)}</span></td>
        <td class="${retClass(m.total_return)}">+${m.total_return}%</td>
        <td>${m.ann_return}%</td><td class="negative">-${m.mdd}%</td><td>${m.sharpe}</td>
        <td class="${retClass(diff)}">${diff>0?'+':''}${diff}%</td></tr>`;
    }
    // 機構
    for (const [name, f] of Object.entries(a.institutional||{})) {
      if (!f.metrics) continue;
      const m = f.metrics, diff = (m.total_return - mom.total_return).toFixed(1);
      h += `<tr><td>🏦 ${esc(name)} <span style="color:#666;font-size:0.75rem">${esc(f.desc)}</span></td>
        <td class="${retClass(m.total_return)}">+${m.total_return}%</td>
        <td>${m.ann_return}%</td><td class="negative">-${m.mdd}%</td><td>${m.sharpe}</td>
        <td class="${retClass(diff)}">${diff>0?'+':''}${diff}%</td></tr>`;
    }
    h += '</table>';

    // 統計摘要
    const congRets = Object.values(a.congress||{}).filter(c=>c.metrics).map(c=>c.metrics.total_return);
    const instRets = Object.values(a.institutional||{}).filter(c=>c.metrics).map(c=>c.metrics.total_return);
    const congAvg = congRets.length ? (congRets.reduce((a,b)=>a+b,0)/congRets.length) : 0;
    const instAvg = instRets.length ? (instRets.reduce((a,b)=>a+b,0)/instRets.length) : 0;
    const congMDD = Object.values(a.congress||{}).filter(c=>c.metrics).map(c=>c.metrics.mdd);
    const instMDD = Object.values(a.institutional||{}).filter(c=>c.metrics).map(c=>c.metrics.mdd);
    const congMDDAvg = congMDD.length ? (congMDD.reduce((a,b)=>a+b,0)/congMDD.length) : 0;
    const instMDDAvg = instMDD.length ? (instMDD.reduce((a,b)=>a+b,0)/instMDD.length) : 0;

    h += '<div class="card-grid">';
    h += `<div class="card"><h3>報酬比較</h3><div class="stat-row">
      <div class="stat-box"><div class="stat-value positive">+${mom.total_return}%</div><div class="stat-label">動能策略</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#3498db">+${congAvg.toFixed(1)}%</div><div class="stat-label">國會平均</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#9b59b6">+${instAvg.toFixed(1)}%</div><div class="stat-label">機構平均</div></div>
    </div></div>`;
    h += `<div class="card"><h3>風險比較（MDD）</h3><div class="stat-row">
      <div class="stat-box"><div class="stat-value" style="color:#2ecc71">${mom.mdd}%</div><div class="stat-label">動能策略</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#f39c12">${congMDDAvg.toFixed(1)}%</div><div class="stat-label">國會平均</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#e74c3c">${instMDDAvg.toFixed(1)}%</div><div class="stat-label">機構平均</div></div>
    </div></div>`;
    h += '</div>';

    // 持倉紀錄時間軸
    if (a.momentum_holdings_log && a.momentum_holdings_log.length) {
      h += '<h3>動能策略換倉紀錄（過去兩年）</h3><table><tr><th>日期</th><th>持倉</th><th>動能分數</th></tr>';
      a.momentum_holdings_log.forEach(r => {
        const holdStr = r.holdings.join(', ');
        const scoreStr = Object.entries(r.scores||{}).map(([s,v])=>`${s}:${v}`).join(' | ');
        h += `<tr><td>${r.date}</td><td><strong>${holdStr}</strong></td><td style="color:#888;font-size:0.78rem">${scoreStr}</td></tr>`;
      });
      h += '</table>';
    }

    // 分析結論
    h += `<div class="card"><h3>超額報酬分析結論</h3><ul style="padding-left:20px;line-height:2;font-size:0.88rem">
      <li>動能策略 <strong>+${mom.total_return}%</strong>，大幅打敗 VOO +${voo.total_return}%（超額 +${(mom.total_return-voo.total_return).toFixed(1)}%）</li>
      <li>MDD 僅 <strong>${mom.mdd}%</strong>，遠低於機構平均 ${instMDDAvg.toFixed(1)}%（機構報酬高但回撤大 2-3 倍）</li>
      <li>機構表面報酬高（+${instAvg.toFixed(0)}%），但多為<strong>集中持股</strong>+小型股，散戶照抄面臨流動性和心理壓力風險</li>
      <li>國會議員分化大（Davidson +127% vs Norcross +12%），說明<strong>個別押注不可複製</strong></li>
      <li>Sharpe 比較：動能 <strong>${mom.sharpe}</strong> vs VOO ${voo.sharpe} — 風險調整後動能明顯勝出</li>
      <li>結論：動能策略是<strong>最適合散戶的系統化方法</strong> — 不需選股，自動輪動，回撤可控</li>
    </ul></div>`;
  }

  el.innerHTML = h;
  if (D.us) setTimeout(()=>drawChart('chartUS',D.us,['VOO','QQQ','SOXX','GLD','SPMO'],156),100);
}

function drawChart(id, data, syms, weeks) {
  const c = document.getElementById(id); if (!c) return;
  const colors = ['#7c85ff','#2ecc71','#e74c3c','#f39c12','#9b59b6','#3498db'];
  let commonDates = null;
  syms.forEach(s => { if (!data.data[s]) return; const d=Object.keys(data.data[s]).sort(); const r=weeks?d.slice(-weeks):d; if(!commonDates||r.length<commonDates.length) commonDates=r; });
  if (!commonDates||commonDates.length<2) return;
  const datasets = syms.map((s,i) => {
    if (!data.data[s]) return null;
    const bp = data.data[s][commonDates[0]]; if(!bp) return null;
    return { label:s, data:commonDates.map(d=>{const p=data.data[s][d];return p?((p/bp-1)*100):null;}), borderColor:colors[i%6], backgroundColor:'transparent', borderWidth:2, pointRadius:0, tension:0.1 };
  }).filter(Boolean);
  new Chart(c, { type:'line', data:{labels:commonDates,datasets}, options:{ responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#888'}}}, scales:{x:{ticks:{color:'#555',maxTicksLimit:12},grid:{color:'#1a1a2e'}},y:{ticks:{color:'#555',callback:v=>v+'%'},grid:{color:'#1a1a2e'}}} }});
}

// ════════════════════════════════════════════
//  TAB 5: 台股研究
// ════════════════════════════════════════════
function renderTwResearch() {
  const el = document.getElementById('sec-twresearch');
  const d = D.twRes;
  if (!d) { el.innerHTML='<div class="loading">無台股研究數據</div>'; return; }

  let h = `<div class="banner banner-ok">期間：${esc(d.period)} | 規則：${esc(d.rules)} | 更新：${esc(d.updated)}</div>`;

  // 基準
  const bm = d.benchmark;
  h += '<h2>基準：0050 Buy & Hold</h2><div class="stat-row">';
  h += `<div class="stat-box"><div class="stat-value" style="color:#7c85ff">${bm.sharpe}</div><div class="stat-label">Sharpe</div></div>`;
  h += `<div class="stat-box"><div class="stat-value positive">+${bm.cagr}%</div><div class="stat-label">CAGR</div></div>`;
  h += `<div class="stat-box"><div class="stat-value negative">${bm.mdd}%</div><div class="stat-label">MDD</div></div>`;
  h += `<div class="stat-box"><div class="stat-value" style="color:#888">${bm.vol}%</div><div class="stat-label">Vol</div></div>`;
  h += '</div>';

  // Top 策略排名
  h += '<h2>策略排名（依 Sharpe）</h2>';
  h += '<table><tr><th>#</th><th>策略</th><th>類別</th><th>Sharpe</th><th>CAGR</th><th>MDD</th><th>2022 MDD</th><th>2025 MDD</th></tr>';
  (d.top_strategies||[]).forEach((s, i) => {
    const sc = s.sharpe >= 1.15 ? '#2ecc71' : s.sharpe >= 1.05 ? '#f39c12' : '#888';
    h += `<tr><td>${i+1}</td><td><strong>${esc(s.name)}</strong><br><span style="color:#666;font-size:0.75rem">${esc(s.desc)}</span></td>
      <td><span class="tag tag-purple">${esc(s.category)}</span></td>
      <td style="color:${sc};font-weight:700">${s.sharpe}</td>
      <td class="positive">+${s.cagr}%</td>
      <td class="negative">${s.mdd}%</td>
      <td class="negative">${s.stress_2022_mdd}%</td>
      <td class="negative">${s.stress_2025_mdd}%</td></tr>`;
  });
  h += '</table>';

  // 高原掃描
  if (d.plateau_scan) {
    const p = d.plateau_scan;
    h += '<h2>參數高原（穩定區域）</h2><div class="card"><div class="stat-row">';
    h += `<div class="stat-box"><div class="stat-value" style="color:#2ecc71">${esc(p.best_zone)}</div><div class="stat-label">最佳高原</div></div>`;
    h += `<div class="stat-box"><div class="stat-value" style="color:#7c85ff">${esc(p.sharpe_range)}</div><div class="stat-label">Sharpe 範圍</div></div>`;
    h += `<div class="stat-box"><div class="stat-value" style="color:#2ecc71">${p.oos_sharpe}</div><div class="stat-label">樣本外 Sharpe</div></div>`;
    h += `<div class="stat-box"><div class="stat-value" style="color:#f39c12">${p.rolling_3y_pct_negative}</div><div class="stat-label">滾動3y Sharpe<0</div></div>`;
    h += '</div>';
    h += `<p style="font-size:0.82rem;color:#aaa;margin-top:8px">鄰居穩定性 std=${p.neighbor_std} | 前後半差距=${p.half_split_gap} | 滾動3y mean=${p.rolling_3y_mean}</p>`;
    h += '</div>';
  }

  // 壓力測試
  if (d.stress_periods) {
    h += '<h2>壓力期 MDD 比較</h2><div class="card-grid">';
    d.stress_periods.forEach(sp => {
      h += `<div class="card"><h3>${esc(sp.name)}</h3><div class="stat-row">
        <div class="stat-box"><div class="stat-value negative">${sp.bh_mdd}%</div><div class="stat-label">0050 B&H</div></div>
        <div class="stat-box"><div class="stat-value" style="color:#2ecc71">${sp.best_strategy_mdd}%</div><div class="stat-label">${esc(sp.best_name)}</div></div>
      </div></div>`;
    });
    h += '</div>';
  }

  // 主動式 ETF 觀察
  if (d.active_etf_watch) {
    h += '<h2>主動式 ETF 觀察（數據不足，僅追蹤）</h2>';
    h += '<table><tr><th>代碼</th><th>名稱</th><th>數據週數</th><th>報酬</th><th>備註</th></tr>';
    d.active_etf_watch.forEach(e => {
      h += `<tr><td><strong>${esc(e.symbol)}</strong></td><td>${esc(e.name)}</td>
        <td>${e.data_weeks}W</td><td class="positive">${esc(e.return)}</td>
        <td style="color:#888;font-size:0.78rem">${esc(e.note)}</td></tr>`;
    });
    h += '</table>';
  }

  // 警告
  if (d.warnings) {
    h += '<h2>誠實警告</h2><div class="card" style="border-color:#f39c12"><ul style="padding-left:20px;line-height:2;font-size:0.88rem">';
    d.warnings.forEach(w => {
      h += `<li style="color:#f39c12">${esc(w)}</li>`;
    });
    h += '</ul></div>';
  }

  // 測試方法清單
  if (d.methods_tested) {
    h += '<h2>已測試方法（' + d.methods_tested.length + ' 種）</h2><div class="card"><div style="display:flex;flex-wrap:wrap;gap:6px">';
    d.methods_tested.forEach(m => {
      h += `<span class="tag tag-blue">${esc(m)}</span>`;
    });
    h += '</div></div>';
  }

  el.innerHTML = h;
}

loadAll();
